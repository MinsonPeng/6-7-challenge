<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6.67 / 6.70 極限挑戰賽</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            text-align: center; 
            font-family: "Microsoft JhengHei", Arial, sans-serif; 
            overflow: hidden;
            /* 防止手機長按選取文字影響遊戲 */
            user-select: none;
            -webkit-user-select: none;
            /* 讓整個畫面都具備點擊感 */
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }
        #header { font-size: 40px; color: #ffcc00; font-weight: bold; }
        
        #timer { 
            font-size: 350px; 
            margin: 20px 0; 
            color: #ff0000; 
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        
        #msg { font-size: 60px; min-height: 80px; transition: all 0.3s; }
        .sub-msg { font-size: 45px; margin-top: 20px; color: #00e5ff; }
        .instruction { font-size: 24px; color: #888; margin-top: 30px; }
    </style>
</head>
<body onclick="handleTrigger()" ontouchstart="handleTouch(event)">
    <div id="header">目標挑戰時間：6.67 秒 或 6.70 秒</div>
    
    <div id="timer">0.00</div>
    
    <div id="msg">準備好了嗎？</div>
    <div id="sub-info" class="sub-msg">點擊螢幕、按任意鍵 或 拍擊按鈕</div>

    <div class="instruction">提示：達成目標即可獲得精美大獎！</div>

    <script>
        let startTime, timerInterval, running = false;
        let lastTriggerTime = 0; 
        const DEBOUNCE_TIME = 200; 

        const timerDisplay = document.getElementById('timer');
        const msgDisplay = document.getElementById('msg');
        const subInfo = document.getElementById('sub-info');

        // 1. 支援鍵盤任意鍵
        document.addEventListener('keydown', (e) => {
            handleTrigger();
        });

        // 2. 支援手機觸控 (優化反應速度)
        function handleTouch(e) {
            e.preventDefault(); // 防止手機瀏覽器預設行為
            handleTrigger();
        }

        // 核心處理邏輯 (3. 支援滑鼠點擊由 body onclick 觸發)
        function handleTrigger() {
            const now = Date.now();
            if (now - lastTriggerTime < DEBOUNCE_TIME) return; 
            lastTriggerTime = now;

            if (!running) {
                startTimer();
            } else {
                stopTimer();
            }
        }

            running = true;
            startTime = Date.now();
            msgDisplay.innerText = "跑！精準停下...";
