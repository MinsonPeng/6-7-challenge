<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6.67 / 6.70 極限挑戰賽</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            text-align: center; 
            font-family: "Microsoft JhengHei", Arial, sans-serif; 
            overflow: hidden;
            /* 讓整個畫面都變成可點擊區域 */
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            /* 防止手機選取文字 */
            user-select: none;
            -webkit-user-select: none;
        }
        
        #target-hint {
            font-size: 28px;
            color: #00e5ff;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        #header { 
            font-size: 45px; 
            color: #ffcc00; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #timer { 
            font-size: 350px; 
            margin: 10px 0; 
            color: #ff0000; 
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        
        #msg { font-size: 60px; min-height: 80px; transition: all 0.3s; }
        .sub-msg { font-size: 45px; margin-top: 20px; color: #00e5ff; }
        .instruction { font-size: 24px; color: #888; margin-top: 30px; }
    </style>
</head>
<body>
    
    <div id="target-hint">目標挑戰時間：6.67 秒 或 6.70 秒</div>
    <div id="header">6.67 / 6.70 極限挑戰賽</div>
    
    <div id="timer">0.00</div>
    
    <div id="msg">準備好了嗎？</div>
    <div id="sub-info" class="sub-msg">點擊螢幕、按任意鍵 或 拍擊按鈕</div>
    <div class="instruction">提示：達成目標即可獲得精美大獎！</div>

    <script>
        let startTime, timerInterval, running = false;
        let lastTriggerTime = 0; 
        const DEBOUNCE_TIME = 200; 

        const timerDisplay = document.getElementById('timer');
        const msgDisplay = document.getElementById('msg');
        const subInfo = document.getElementById('sub-info');

        // --- 全方位觸發邏輯 ---

        // 1. 電腦鍵盤：監聽任意鍵按下 (keydown)
        window.addEventListener('keydown', function(e) {
            handleTrigger();
        });

        // 2. 滑鼠點擊：監聽網頁任何位置點擊 (mousedown 比 click 更快)
        window.addEventListener('mousedown', function(e) {
            // 如果是觸控觸發的 mousedown 則忽略，避免重複觸發
            if (e.detail === 0) return; 
            handleTrigger();
        });

        // 3. 手機/平板：監聽觸碰開始 (touchstart)，優化延遲
        window.addEventListener('touchstart', function(e) {
            e.preventDefault(); // 防止手機預設縮放或點擊行為
            handleTrigger();
        }, { passive: false });

        // --- 核心運作函式 ---

        function handleTrigger() {
            const now = Date.now();
            if (now - lastTriggerTime < DEBOUNCE_TIME) return; 
            lastTriggerTime = now;

            if (!running) {
                startTimer();
            } else {
                stopTimer();
            }
        }

        function startTimer() {
            running = true;
            startTime = Date.now();
            msgDisplay.innerText = "跑！精準停下...";
            msgDisplay.style.color = "white";
            subInfo.innerText = "挑戰進行中...";
            timerDisplay.style.color = "#ff0000"; 
            
            timerInterval = setInterval(() => {
                let elapsed = (Date.now() - startTime) / 1000;
                timerDisplay.innerText = elapsed.toFixed(2);
            }, 10);
        }

        function stopTimer() {
            running = false;
            clearInterval(timerInterval);
            
            let finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
            timerDisplay.innerText = finalTime;
            
            if (finalTime === "6.67" || finalTime === "6.70") {
                msgDisplay.innerText = "🎉 完美！恭喜獲得大獎！ 🎉";
                msgDisplay.style.color = "#ffeb3b"; 
                subInfo.innerText = "獎勵：可任選攤位商品一件！";
                subInfo.style.fontSize = "55px";
                subInfo.style.fontWeight = "bold";
                timerDisplay.style.color = "#ffeb3b"; 
            } else {
                msgDisplay.innerText = "可惜！差一點點...";
                msgDisplay.style.color = "#ff5252"; 
                subInfo.innerText = "再試一次，挑戰 6.67 或 6.70！";
                subInfo.style.fontSize = "45px";
                subInfo.style.fontWeight = "normal";
                timerDisplay.style.color = "#ff0000"; 
            }
        }
    </script>
</body>
</html>
